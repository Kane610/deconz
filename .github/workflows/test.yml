# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Run Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install dependencies (uv)
        run: |
          bash ./setup.sh
      - name: Check lint with Ruff
        run: |
          UV_BIN="$(command -v uv || echo $HOME/.local/bin/uv)"
          "$UV_BIN" run ruff check pydeconz tests
      - name: Check formatting with ruff
        run: |
          UV_BIN="$(command -v uv || echo $HOME/.local/bin/uv)"
          "$UV_BIN" run ruff format --check pydeconz tests
      - name: Check typing with mypy
        run: |
          UV_BIN="$(command -v uv || echo $HOME/.local/bin/uv)"
          "$UV_BIN" run mypy pydeconz
      - name: Test with pytest
        run: |
          UV_BIN="$(command -v uv || echo $HOME/.local/bin/uv)"
          "$UV_BIN" run pytest tests --doctest-modules --junitxml=junit/test-results.xml --cov=pydeconz --cov-report=xml --cov-report=html
